<!DOCTYPE html>
<html>
<head>
    <title>Test Cart API</title>
</head>
<body>
    <h1>Test Cart API</h1>
    <div id="output"></div>
    
    <script>
        async function testLogin() {
            try {
                const response = await fetch('http://localhost/ecommerce_api/index.php/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'customer@gmail.com',
                        password: '123456789012'
                    })
                });
                
                const data = await response.json();
                console.log('Login response:', data);
                
                if (data.success) {
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    document.getElementById('output').innerHTML += '<p>✅ Login successful</p>';
                    testAddToCart();
                } else {
                    document.getElementById('output').innerHTML += '<p>❌ Login failed: ' + data.message + '</p>';
                }
            } catch (error) {
                console.error('Login error:', error);
                document.getElementById('output').innerHTML += '<p>❌ Login error: ' + error.message + '</p>';
            }
        }
        
        async function testAddToCart() {
            try {
                const token = localStorage.getItem('token');
                console.log('Using token:', token);
                
                const response = await fetch('http://localhost/ecommerce_api/index.php/api/cart', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({
                        product_id: 1,
                        quantity: 1
                    })
                });
                
                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Add to cart response:', data);
                
                if (data.success) {
                    document.getElementById('output').innerHTML += '<p>✅ Added to cart successfully</p>';
                } else {
                    document.getElementById('output').innerHTML += '<p>❌ Add to cart failed: ' + data.message + '</p>';
                }
            } catch (error) {
                console.error('Add to cart error:', error);
                document.getElementById('output').innerHTML += '<p>❌ Add to cart error: ' + error.message + '</p>';
            }
        }
        
        // Start test
        document.addEventListener('DOMContentLoaded', testLogin);
    </script>
</body>
</html>
